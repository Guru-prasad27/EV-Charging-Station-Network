# ===================== Server =====================
server.port=8083

# ===================== Datasource (H2 - in-memory) =====================
spring.datasource.url=jdbc:h2:mem:sessiondb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===================== H2 Console =====================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ===================== JPA / Hibernate =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===================== Logging =====================
logging.level.root=INFO
logging.level.com.greencharge.sessionservice=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===================== App Info =====================
spring.application.name=session-service

# ===================== Downstream service (called via RestTemplate) =====================
booking.service.base-url=http://localhost:8082
